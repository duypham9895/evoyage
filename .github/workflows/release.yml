name: Create GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"

          notes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md)

          prerelease_flag=""
          if [[ "$version" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          if [ -n "$notes" ]; then
            echo "$notes" > /tmp/release-notes.md
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              $prerelease_flag
          else
            echo "No CHANGELOG section found for $version — falling back to auto-generated notes"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $prerelease_flag
          fi
