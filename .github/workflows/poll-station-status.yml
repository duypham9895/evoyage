name: Poll Station Status

# Calls the Vercel polling endpoint every 2 hours to dedup-on-change insert
# fresh chargingStatus observations into Postgres. Pairs with the
# refresh-vinfast-cookies workflow (which keeps the cookie row valid).
#
# Cadence rationale: hourly would be ideal for the 168-cell heatmap, but the
# combined GHA budget on a private repo at ~2000 min/month doesn't fit
# (cookie refresh + crawl-stations.yml + this) at hourly. Every 2 hours gives
# 12 samples/day per cell — still statistically usable for popularity prediction.
#
# Production finding 2026-05-03: This workflow replaces the spec's original
# cron-job.org dependency, removing operator setup burden and keeping the
# whole pipeline inside infra we already operate.

on:
  schedule:
    # Every 2 hours, 5 minutes past the hour (gives the cookie-refresh
    # workflow time to finish its top-of-hour run before we poll).
    - cron: '5 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  # Needed so `gh run list` can query refresh-vinfast-cookies status for the
  # derivative-failure check below.
  actions: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST poll-station-status
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response=$(curl -s -X POST https://evoyagevn.vercel.app/api/cron/poll-station-status \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 60 \
            --fail-with-body)
          echo "Response: $response"

          if echo "$response" | grep -q '"ok":true'; then
            exit 0
          fi

          # ok=false. If the failure is cookies_expired / cookies_missing AND the
          # latest refresh-vinfast-cookies run also failed, this is a derivative
          # symptom — warn but don't fail the workflow. The cookie-refresh job
          # is the real signal; pairing both failures doubles the alarm volume
          # without adding information.
          if echo "$response" | grep -qE '"reason":"cookies_(expired|missing)"'; then
            latest_refresh=$(gh run list \
              --workflow=refresh-vinfast-cookies.yml \
              --limit=1 \
              --json conclusion \
              --jq '.[0].conclusion // ""' 2>/dev/null || echo "")
            if [ "$latest_refresh" = "failure" ]; then
              echo "::warning::Polling skipped — derivative of failed cookie refresh (latest conclusion: $latest_refresh)"
              exit 0
            fi
          fi

          echo "::error::Polling endpoint returned ok=false"
          exit 1
