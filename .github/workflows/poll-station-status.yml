name: Poll Station Status

# Runs the VinFast polling job every 2 hours to dedup-on-change insert fresh
# chargingStatus observations into Postgres.
#
# Cadence rationale: hourly would be ideal for the 168-cell heatmap, but the
# combined GHA budget on a private repo at ~2000 min/month doesn't fit
# (refresh-vinfast-cookies.yml + crawl-stations.yml + this) at hourly. Every 2
# hours gives 12 samples/day per cell — still statistically usable for
# popularity prediction.
#
# Production finding 2026-05-25: VinFast/Cloudflare accepts the browser
# verification request during cookie refresh, but can still reject Vercel's
# server-side replay of those cookies with 403. Poll from a Chromium context on
# the GitHub runner instead of POSTing the Vercel endpoint.

on:
  schedule:
    # Every 2 hours, 5 minutes past the hour (gives the cookie-refresh
    # workflow time to finish its top-of-hour run before we poll).
    - cron: '5 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('./node_modules/playwright/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Chromium
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Poll station status
        run: npx tsx scripts/poll-vinfast-station-status.ts
