name: Crawl Charging Stations

on:
  schedule:
    # Run daily at 01:00 UTC (08:00 AM Vietnam)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # Primary source — VinFast / V-Green (~16k stations). Failure here fails the job.
      - name: Crawl VinFast stations
        run: npx tsx scripts/crawl-vinfast-stations.ts

      # Secondary sources — non-VinFast diversity (Tier A). Each step is wrapped in
      # `continue-on-error: true` so a flaky upstream doesn't block the others.
      - name: Crawl EVPower stations
        continue-on-error: true
        run: npx tsx scripts/crawl-evpower-stations.ts

      - name: Seed OpenStreetMap stations
        continue-on-error: true
        run: npx tsx scripts/seed-osm-stations.ts

      - name: Seed Open Charge Map stations
        continue-on-error: true
        env:
          OPEN_CHARGE_MAP_API_KEY: ${{ secrets.OPEN_CHARGE_MAP_API_KEY }}
        run: npx tsx scripts/fetch-universal-stations.ts

      - name: Seed manual-curation CSV
        continue-on-error: true
        run: npx tsx scripts/seed-manual-stations.ts

      - name: Sync README station count
        run: npx tsx scripts/update-readme-stats.ts

      - name: Commit station-stats + README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/station-stats.json README.md
          if git diff --cached --quiet; then
            echo "No station-count changes to commit."
            exit 0
          fi
          COUNT=$(node -e "console.log(require('./src/data/station-stats.json').count)")
          git commit -m "chore(stations): sync VinFast count to ${COUNT} [skip ci]"
          git push
