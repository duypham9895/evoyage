name: Crawl Charging Stations

on:
  schedule:
    # Run daily at 01:00 UTC (08:00 AM Vietnam)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

# Serialize so a manual dispatch during the daily run can't race the automation
# PR update at the end of the job.
concurrency:
  group: crawl-stations
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # Primary source — VinFast / V-Green (~16k stations). Failure here fails the job.
      - name: Crawl VinFast stations
        run: npx tsx scripts/crawl-vinfast-stations.ts

      # Secondary sources — non-VinFast diversity (Tier A). Each step is wrapped in
      # `continue-on-error: true` so a flaky upstream doesn't block the others.
      - name: Crawl EVPower stations
        continue-on-error: true
        run: npx tsx scripts/crawl-evpower-stations.ts

      - name: Seed OpenStreetMap stations
        continue-on-error: true
        run: npx tsx scripts/seed-osm-stations.ts

      - name: Seed Open Charge Map stations
        continue-on-error: true
        env:
          OPEN_CHARGE_MAP_API_KEY: ${{ secrets.OPEN_CHARGE_MAP_API_KEY }}
        run: npx tsx scripts/fetch-universal-stations.ts

      - name: Seed manual-curation CSV
        continue-on-error: true
        run: npx tsx scripts/seed-manual-stations.ts

      - name: Promote crowdsourced reports
        continue-on-error: true
        run: npx tsx scripts/promote-crowdsourced-stations.ts

      - name: Sync README station count
        run: npx tsx scripts/update-readme-stats.ts

      - name: Open station-stats sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/station-stats.json README.md
          if git diff --cached --quiet; then
            echo "No station-count changes to commit."
            exit 0
          fi
          COUNT=$(node -e "console.log(require('./src/data/station-stats.json').count)")

          branch="automation/stations"
          git checkout -b "$branch"
          git commit -m "chore(stations): sync VinFast count to ${COUNT}"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git push --force-with-lease origin "$branch"

          existing_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing_pr" ]; then
            echo "Updated existing station sync PR #$existing_pr."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(stations): sync VinFast count to ${COUNT}" \
            --body "Automated station count sync from the scheduled GitHub Actions workflow."
