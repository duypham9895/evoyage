name: Crawl Charging Stations

on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC (7:00 AM Vietnam)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Crawl Google Maps stations
        run: npx tsx scripts/crawl-gmaps-stations.ts

      - name: Clean non-Vietnam stations
        run: npx tsx scripts/clean-non-vn.ts

      - name: Enrich station data
        run: npx tsx scripts/enrich-stations.ts
