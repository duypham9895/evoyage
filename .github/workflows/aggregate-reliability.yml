name: Aggregate Station Reliability

# Daily aggregation that rebuilds the StationReliability score from the
# rolling 30-day window of StationStatusObservation rows, per ADR-0007.
#
# Companion to Aggregate Station Popularity (which owns observation pruning).
# Idempotent — re-running on the same day overwrites with identical numbers.

on:
  schedule:
    # Daily at 19:30 UTC = 02:30 AM Vietnam — staggered 30 min after
    # aggregate-popularity to avoid simultaneous DB load.
    - cron: '30 19 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST aggregate-reliability
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -s -X POST https://evoyage.duypham.me/api/cron/aggregate-reliability \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 120 \
            --fail-with-body)
          echo "Response: $response"
          if echo "$response" | grep -q '"ok":false'; then
            echo "::error::Aggregation endpoint returned ok=false"
            exit 1
          fi
