name: Crawl Energy Prices

on:
  schedule:
    # Run daily at 03:00 UTC (10:00 AM Vietnam) — Petrolimex usually adjusts
    # at 15:00 ICT (08:00 UTC) on Thursdays, so 10:00 AM next-day reliably
    # captures the previous day's adjustment.
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

# Serialize so a manual dispatch can't race the automation PR update.
concurrency:
  group: crawl-energy-prices
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Crawl energy prices (Petrolimex + V-GREEN + EVN)
        run: npx tsx scripts/crawl-energy-prices.ts

      - name: Sync README energy-prices block
        run: npx tsx scripts/update-readme-stats.ts

      - name: Open energy-prices sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/energy-prices.json README.md
          if git diff --cached --quiet; then
            echo "No energy-price changes to commit."
            exit 0
          fi

          branch="automation/energy-prices"
          git checkout -b "$branch"
          git commit -m "chore(energy-prices): daily sync"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git push --force-with-lease origin "$branch"

          existing_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing_pr" ]; then
            echo "Updated existing energy-prices sync PR #$existing_pr."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(energy-prices): daily sync" \
            --body "Automated energy price data sync from the scheduled GitHub Actions workflow."
