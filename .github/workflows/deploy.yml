name: Deploy to Vercel

on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Prisma schema vs production DB
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          if [ -z "${DIRECT_URL:-}" ]; then
            echo "::error::DIRECT_URL secret is not set on the repo. Add it (Supabase direct-connection URL, port 5432) under Settings → Secrets → Actions."
            exit 1
          fi
          if ! npx prisma migrate diff \
            --from-url "$DIRECT_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code; then
            echo ""
            echo "::error::Schema drift detected — prisma/schema.prisma does not match the production DB."
            echo "::error::Run 'npx prisma db push' against Supabase before pushing schema changes."
            exit 1
          fi

      - name: Run unit tests
        run: npm test

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -e "console.log(require('./node_modules/playwright/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Install Playwright system deps (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit firefox

      - name: Run E2E tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN || 'pk.dummy_token_for_ci_build' }}

      - name: Upload E2E test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Create GitHub deployment
        id: gh-deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deployment_id=$(jq -n --arg sha "${{ github.sha }}" '{
            ref: $sha,
            environment: "production",
            description: "Vercel production deploy",
            auto_merge: false,
            required_contexts: []
          }' | gh api "repos/${{ github.repository }}/deployments" --method POST --input - --jq '.id')
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Deploy
        id: vercel-deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tail -n1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/deployments/${{ steps.gh-deployment.outputs.id }}/statuses" \
            --method POST \
            -f state="success" \
            -f environment_url="${{ steps.vercel-deploy.outputs.url }}" \
            -f description="Deployed to Vercel"

      - name: Mark deployment failure
        if: failure() && steps.gh-deployment.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/deployments/${{ steps.gh-deployment.outputs.id }}/statuses" \
            --method POST \
            -f state="failure" \
            -f description="Vercel deploy failed"
