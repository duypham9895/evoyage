name: Refresh VinFast Cookies

on:
  schedule:
    # Hourly. CF clearance cookies on vinfastauto.com expire ~2 hours after
    # issuance (production finding 2026-05-03), so a weekly refresh leaves
    # the polling endpoint serving expired cookies 99% of the time.
    # Hourly refresh + 2-hour cookie TTL = always a 1-hour buffer.
    # Cost: ~720 runs/month × ~2 min = ~1440 min/month on GHA private-repo
    # free tier (2000 min/month). Tight but fits with the existing
    # crawl-stations.yml at ~600 min/month.
    - cron: '0 * * * *'
  workflow_dispatch: # manual trigger for ad-hoc recovery

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Refresh cookies
        run: npx tsx scripts/refresh-vinfast-cookies.ts
