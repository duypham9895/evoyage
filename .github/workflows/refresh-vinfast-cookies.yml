name: Refresh VinFast Cookies

on:
  schedule:
    # Every 2 hours. CF clearance cookies on vinfastauto.com expire ~2 hours
    # after issuance (production finding 2026-05-03). Refreshing every 2 hours
    # has zero buffer in the worst case (refresh runs at T+2h+5s, polling at
    # T+1h59m gets cookies_expired) — acceptable: the next polling cycle picks
    # up the new cookies. Hourly refresh would give a 1-hour buffer but
    # exceeds the GHA private-repo 2000 min/month budget when combined with
    # poll-station-status.yml + crawl-stations.yml.
    # Cost: ~360 runs/month × ~2 min = ~720 min/month
    - cron: '0 */2 * * *'
  workflow_dispatch: # manual trigger for ad-hoc recovery

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright Chromium
        # Skip --with-deps: ubuntu-latest already preinstalls every shared
        # library Chromium dlopen()s (libpango, libx11, libxcb, libfontconfig,
        # libfreetype, etc. — see cancelled-run logs where every dep showed
        # "already the newest version"). The only "newly installed" packages
        # under --with-deps were CJK/cyrillic fonts (fonts-wqy-zenhei,
        # fonts-ipafont-gothic, fonts-unifont…) which this script never
        # renders — it only calls page.goto() and context.cookies().
        # Pulling those from Azure mirrors blew past the job timeout
        # whenever the mirror was slow and silently broke the polling cron.
        run: npx playwright install chromium

      - name: Refresh cookies
        run: npx tsx scripts/refresh-vinfast-cookies.ts
