name: Warm Station POIs

# Pre-populates the StationPois cache for top 50 VinFast stations so
# first-time visitors hit a warm cache (<50ms) instead of waiting for
# Overpass round-trip (~1.5s). Daily cadence is plenty — POIs don't
# change weekly.

on:
  schedule:
    # Daily at 04:00 UTC (11:00 AM Vietnam, after the morning rush)
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Warm POI cache for top 50 stations
        run: npx tsx scripts/warm-station-pois.ts
